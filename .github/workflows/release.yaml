name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set build metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="devel-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

          # Extract the section for this version from CHANGELOG.md.
          # Matches "## [v1.0.0]" or "## [1.0.0]" down to the next "## [".
          NOTES=$(awk -v tag="${VERSION#v}" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[v?" tag "\\]") found=1; next }
            found { print }
          ' CHANGELOG.md)
          # Write to a file to safely handle multi-line content
          echo "${NOTES}" > /tmp/release-notes.md

      - name: Build binaries
        run: make cross-build
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}

      - name: Release (tagged version)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.version }}
          body_path: /tmp/release-notes.md
          files: dist/*

      - name: Release (devel rolling)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: devel
          name: devel (rolling)
          prerelease: true
          generate_release_notes: false
          body: |
            Rolling release from the `main` branch. Built from commit ${{ github.sha }}.

            Not guaranteed to be stable. Use a tagged release for production.
          files: dist/*
